name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: repo
          POSTGRES_USER: repo
          POSTGRES_PASSWORD: repo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://repo:repo@localhost:5432/repo
      DJANGO_SECRET_KEY: ci-test-key
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
