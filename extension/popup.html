<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, sans-serif; width: 300px; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; font-size: 11px; color: #666; margin: 8px 0 2px; }
    input { width: 100%; box-sizing: border-box; padding: 5px 6px; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 8px; margin-top: 12px; border: 0; border-radius: 6px; background: #1d9bf0; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    #status { margin-top: 10px; font-size: 12px; min-height: 16px; }
    #status a { color: #1d9bf0; }
    .ok { color: #15803d; } .err { color: #b91c1c; }
    details { margin-top: 12px; } summary { cursor: pointer; color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <h1>📓 Clip to Notes</h1>
  <button id="clip">Clip this page</button>
  <div id="status"></div>

  <details id="settings">
    <summary>Settings</summary>
    <label>Server URL</label>
    <input id="server" placeholder="http://localhost:8000">
    <label>Clip token</label>
    <input id="token" type="password" placeholder="CLIP_TOKEN from your .env">
    <button id="save" style="background:#444">Save settings</button>
  </details>

  <script src="popup.js"></script>
</body>
</html>
